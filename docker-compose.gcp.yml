# =============================================================================
# SeeQL — GCP Cloud SQL variant.
#
# Adds Cloud Monitoring + Cloud Logging collectors and wires Vertex AI for
# the LLM agent. Use this when your MySQL lives on GCP Cloud SQL.
#
# Prerequisites:
#   - Cloud SQL instance reachable from this host (private IP, VPC peering,
#     or Cloud SQL Auth Proxy on the side).
#   - A GCP service account JSON with:
#       roles/monitoring.viewer
#       roles/logging.viewer
#       roles/aiplatform.user    (only if using Vertex AI for the LLM)
#     Mount it at ./vertex-sa.json (or set GOOGLE_APPLICATION_CREDENTIALS
#     to a different path).
#
# Required env:
#   PROD_DB_HOST, PROD_DB_PASSWORD, PROD_DB_DATABASE
#   GCP_PROJECT_ID, GCP_CLOUD_SQL_INSTANCE
#
# Quickstart:
#   docker compose -f docker-compose.gcp.yml up -d
# =============================================================================

services:
  seeql:
    image: ghcr.io/shubhankar-mohan/seeql:latest-gcp
    # To build from source:
    # build:
    #   context: .
    #   args:
    #     INSTALL_EXTRAS: api,gcp
    container_name: seeql
    # All configuration lives in your mounted seeql.yml (copy seeql.example.yml;
    # add a per-server `gcp:` block for Cloud SQL). .env holds ONLY secrets (${VAR}).
    env_file:
      - .env
    ports:
      - "${SEEQL_API_PORT:-8080}:8080"
    volumes:
      - ./seeql.yml:/etc/seeql/seeql.yml:ro   # your config — copy seeql.example.yml
      - seeql-data:/app/data
      - seeql-logs:/app/logs
      - ${GOOGLE_APPLICATION_CREDENTIALS:-./vertex-sa.json}:/app/gcp-sa.json:ro
    environment:
      SEEQL_CONFIG: /etc/seeql/seeql.yml
      SEEQL_ENV: production
      SEEQL_API_PORT: "8080"
      # GCP service-account key for Vertex AI / Cloud SQL (read by google libs)
      GOOGLE_APPLICATION_CREDENTIALS: /app/gcp-sa.json
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8080/health', timeout=5)"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s

volumes:
  seeql-data:
  seeql-logs:

# =============================================================================
# MySQL DBA Agent — Configuration
# =============================================================================
# Copy this file to settings.local.yaml and fill in your actual values.
# settings.local.yaml is gitignored and will override these defaults.
# =============================================================================

# --- Production MySQL (Cloud SQL 8.0.43) — READ ONLY access ---
production_db:
  host: "10.0.0.1"                  # Cloud SQL private IP
  port: 3306
  user: "dba_agent"                 # Dedicated monitoring user (SELECT + PROCESS only)
  password: "${PROD_DB_PASSWORD}"   # Use env var or replace in local config
  database: "your_database"         # Default schema for EXPLAIN queries
  pool_size: 5                      # 5 connections: collectors + agent live tools need headroom
  connect_timeout: 10

# --- Monitoring Database (SQLite on local disk) ---
# SQLite is the right choice here: single agent process, append-heavy writes,
# periodic reads. No need for a separate Cloud SQL instance.
monitoring_db:
  path: "data/mysql_monitor.db"     # Relative to project root
  wal_mode: true                    # WAL = concurrent reads during writes
  busy_timeout_ms: 5000             # Wait up to 5s if DB is locked
  max_size_mb: 5000                 # Max SQLite DB size in MB, override with SEEQL_DB_MAX_SIZE_MB

# --- Collection Intervals (seconds) ---
intervals:
  fast_loop: 30           # Processlist, locks, active transactions
  medium_loop: 300        # Query digests, wait events, global status, InnoDB, EXPLAIN
  slow_loop: 1800         # Table sizes, index usage, schema snapshots, variables
  retention_loop: 86400   # Daily retention cleanup

# --- Collection Limits ---
limits:
  top_queries: 50         # How many top queries to capture per digest snapshot
  explain_top_n: 10       # How many expensive queries to auto-EXPLAIN
  processlist_query_max_len: 500   # Truncate long queries in processlist
  digest_text_max_len: 1024        # Truncate digest text for storage (was 200, too short for EXPLAIN)
  max_batch_size: 500              # Max rows per batch insert

# --- Data Retention ---
retention:
  days: 90                      # Global default retention
  metric_snapshots: 90
  query_digests: 90
  schema_snapshots: 180
  lock_snapshots: 30
  processlist_snapshots: 7    # Very high volume, keep shorter

# --- Schemas to Exclude from Monitoring ---
excluded_schemas:
  - "mysql"
  - "performance_schema"
  - "sys"
  - "information_schema"

# --- GCP Settings ---
gcp:
  project_id: "your-gcp-project-id"
  cloud_sql_instance_id: "your-instance-id"
  region: "asia-south1"
  vertex_region: "us-east5"              # Region for Vertex AI (Claude: us-east5, Gemini: us-central1)
  monitoring_credentials_file: "${MONITORING_APPLICATION_CREDENTIALS}"  # Optional: separate SA for Monitoring/Logging

# --- LLM Agent ---
agent:
  enabled: true                    # Set to true + provide API key to enable
  model: "claude-opus-4-6"
  max_tokens: 8192
  max_tool_rounds: 10
  schedule_seconds: 900             # 15 minutes
  skip_quiet: true                  # Skip analysis when nothing interesting is happening
  anthropic_api_key: "${ANTHROPIC_API_KEY}"
  state_builder:
    trend_threshold: 0.2            # 20% change = "up" or "down"
    regression_threshold: 3.0       # 3x slowdown = regression
    long_transaction_sec: 30
    lookback_minutes: 5

# --- Alerting ---
alerting:
  enabled: false                    # Set to true to enable alert evaluation
  default_cooldown_minutes: 15
  channels:
    slack:
      enabled: false
      webhook_url: "${SLACK_WEBHOOK_URL}"
    webhook:
      enabled: false
      url: "https://your-endpoint.com/alerts"
      headers:
        Authorization: "Bearer ${WEBHOOK_TOKEN}"
    log:
      enabled: true                 # Always-on fallback
  rules:
    lock_cascade:
      enabled: true
      severity: critical
      min_count: 3
      min_wait_seconds: 10
      cooldown_minutes: 5
      channels: [slack, log]
    threads_running_spike:
      enabled: true
      severity: warning
      multiplier: 4
      cooldown_minutes: 15
      channels: [slack, log]
    query_regression:
      enabled: true
      severity: warning
      threshold: 5.0
      cooldown_minutes: 30
      channels: [slack, log]
    ddl_change:
      enabled: true
      severity: info
      cooldown_minutes: 0
      channels: [slack, log]
    high_cpu:
      enabled: true
      severity: warning
      threshold: 0.85
      cooldown_minutes: 15
      channels: [slack, log]
    deadlock_detected:
      enabled: true
      severity: critical
      cooldown_minutes: 5
      channels: [slack, log]
    anomaly_detection:
      enabled: true
      severity: warning
      z_threshold: 3.0               # Standard deviations from baseline to trigger
      cooldown_minutes: 30
      channels: [slack, log]

# --- Inbound Webhooks (external alerts → SeeQL investigator) ---
webhooks:
  enabled: false                      # Master switch for POST /webhooks/<provider>
  dedup_window_minutes: 5             # Same (provider, external_id) within window
                                      # attaches to the existing investigation
  rate_limit_per_minute: 60           # Per-provider token bucket
  callback_enabled: false             # POST findings back to alert.callback_url
  providers:
    generic:
      enabled: false
      secret: "${SEEQL_GENERIC_WEBHOOK_SECRET}"
      default_server_id: "default"
    gcp:
      enabled: false
      secret: "${SEEQL_GCP_WEBHOOK_SECRET}"
      verify_oidc: true               # Prefer Google-signed OIDC over HMAC
      oidc_audience: ""               # REQUIRED for OIDC: expected `aud` claim,
                                      # i.e. this service's public webhook URL
                                      # (e.g. https://seeql.example.com/webhooks/gcp).
                                      # If empty, OIDC is disabled and only the HMAC
                                      # `secret` path is accepted — never a bare
                                      # Google-signed token without an audience match.
      policy_map:                     # Cloud Monitoring policy → SeeQL trigger
        high-cpu-policy: high_cpu
        lock-wait-policy: lock_cascade
        slow-query-policy: missing_index
    pagerduty:
      enabled: false
      secret: "${SEEQL_PAGERDUTY_SECRET}"
    grafana:
      enabled: false
      secret: "${SEEQL_GRAFANA_SECRET}"

# --- Root-cause Investigator (3-phase orchestrator invoked by webhooks) ---
investigator:
  enabled: true
  max_concurrent_per_server: 2
  queue_depth: 4
  phase1_timeout_seconds: 10
  phase2_timeout_seconds: 120
  phase2_max_tool_rounds: 8
  phase2_live_tool_cap: 10            # live-MySQL tool calls allowed in Phase 2
  phase2_explain_cap: 2               # expensive explain_query calls
  phase3_sampling_interval_seconds: 20
  phase3_max_duration_seconds: 480    # 8 min hard cap
  query_budget_per_minute: 20         # rolling window budget
  load_guard_threads_running_threshold: 40
  load_guard_cpu_threshold: 0.90
  load_guard_pause_seconds: 60
  clearance:
    lock_waits: 1
    max_wait_seconds: 5
    cpu_pct: 0.75
    rows_examined_ratio: 100
  confidence_completion_threshold: 0.8

# --- MCP Server (Model Context Protocol — external Claude clients) ---
mcp:
  enabled: true
  server_name: "seeql"
  allowed_servers: []                 # Empty = any server SeeQL knows about
  action_tools_enabled: false         # Master gate for trigger/abort/explain_query
  allow_trigger: false                # Fine-grain: seeql_trigger_investigation
  allow_abort: false                  # Fine-grain: seeql_abort_investigation
  allow_explain_query: false          # Fine-grain: seeql_explain_query (arbitrary EXPLAIN)
  budget:
    live_calls_per_session: 30
    explain_calls_per_session: 5
    tools_per_minute: 60
  http:
    bind: "127.0.0.1"
    port: 8765
    auth: "bearer"                    # bearer | none (none warns if bind != 127.0.0.1)
    auth_token: "${SEEQL_MCP_TOKEN}"

# --- Prometheus ---
prometheus:
  enabled: true
  cache_ttl_seconds: 10

# --- Logging ---
logging:
  level: "INFO"           # DEBUG for development, INFO for production
  file: "logs/dba_agent.log"
  max_bytes: 10485760     # 10 MB
  backup_count: 5
  max_total_mb: 500       # Max total log size, override with SEEQL_LOG_MAX_SIZE_MB

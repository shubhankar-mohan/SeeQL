name: Docker — build & publish

on:
  push:
    branches: [main]
    tags: ['v*.*.*']
  workflow_dispatch:

concurrency:
  group: docker-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build:
    name: Build ${{ matrix.variant }}
    runs-on: ubuntu-latest
    env:
      # Whether Docker Hub publishing is configured. Job-level so it can read
      # the secret. When false the Docker Hub login + image are skipped and we
      # publish only to GHCR — a missing/expired token must not break GHCR.
      HAS_DOCKERHUB: ${{ secrets.DOCKERHUB_TOKEN != '' }}
    permissions:
      contents: read
      packages: write
      id-token: write
      security-events: write    # upload Trivy SARIF to code scanning
    strategy:
      fail-fast: false
      matrix:
        include:
          - variant: generic
            extras: api
            suffix: ''
          - variant: gcp
            extras: 'api,gcp'
            suffix: '-gcp'

    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-qemu-action@v3

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Log in to Docker Hub
        if: ${{ env.HAS_DOCKERHUB == 'true' }}
        uses: docker/login-action@v3
        with:
          username: shubhankarmohan
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Resolve target image list
        id: imglist
        run: |
          {
            echo "images<<EOF"
            echo "${REGISTRY}/${IMAGE_NAME}"
            if [ "${HAS_DOCKERHUB}" = "true" ]; then
              echo "docker.io/shubhankarmohan/seeql"
            fi
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Compute image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.imglist.outputs.images }}
          flavor: |
            suffix=${{ matrix.suffix }},onlatest=true
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}},enable=${{ !startsWith(github.ref, 'refs/tags/v0.') }}
            type=sha,format=short

      - name: Build & push
        id: build
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            SEEQL_VERSION=${{ github.ref_name }}
            VCS_REF=${{ github.sha }}
            BUILD_DATE=${{ fromJSON(steps.meta.outputs.json).labels['org.opencontainers.image.created'] }}
            INSTALL_EXTRAS=${{ matrix.extras }}
          sbom: true
          provenance: mode=max
          cache-from: type=gha,scope=${{ matrix.variant }}
          cache-to: type=gha,mode=max,scope=${{ matrix.variant }}

      - name: Install cosign
        uses: sigstore/cosign-installer@v3

      - name: Sign image (keyless via Fulcio OIDC)
        env:
          TAGS: ${{ steps.meta.outputs.tags }}
          DIGEST: ${{ steps.build.outputs.digest }}
        run: |
          for tag in $TAGS; do
            cosign sign --yes "${tag}@${DIGEST}"
          done

      # OCI refs must be lowercase, but github.repository can contain uppercase
      # (e.g. shubhankar-mohan/SeeQL), which Trivy cannot parse. Lowercase it.
      - name: Lowercase image ref for Trivy
        id: imgref
        if: ${{ startsWith(github.ref, 'refs/tags/v') }}
        env:
          DIGEST: ${{ steps.build.outputs.digest }}
        run: echo "ref=${REGISTRY}/${IMAGE_NAME,,}@${DIGEST}" >> "$GITHUB_OUTPUT"

      - name: Trivy vulnerability scan
        if: ${{ startsWith(github.ref, 'refs/tags/v') }}
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ steps.imgref.outputs.ref }}
          format: sarif
          output: trivy-${{ matrix.variant }}.sarif
          severity: HIGH,CRITICAL
          exit-code: '1'
          ignore-unfixed: true

      - name: Upload Trivy results
        if: ${{ always() && startsWith(github.ref, 'refs/tags/v') }}
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-${{ matrix.variant }}.sarif
          category: trivy-${{ matrix.variant }}
